<style>
  body { font-family: -apple-system, sans-serif; max-width: 1000px; margin: 24px auto; padding: 0 16px; color: #222; }
  .setup { background: #FFF8E1; border: 1px solid #E8D9A0; border-radius: 8px; padding: 14px 18px; margin-bottom: 20px; font-size: 14px; }
  .setup input { width: 100%; margin: 4px 0 10px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  input[type=text] { flex: 1; min-width: 180px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 8px 14px; border: 1px solid #888; border-radius: 6px; background: #fff; cursor: pointer; }
  button.primary { background: #1B4B5A; color: #fff; border-color: #1B4B5A; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
  th { background: #fafafa; }
  .status { font-size: 13px; color: #666; margin: 8px 0; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 10px; padding: 20px; width: 400px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
  .field input, .field textarea { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; }
  .filters { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .dropdown-box { position: relative; }
  .dropdown-toggle { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; min-width: 140px; text-align: left; font: inherit; }
  .dropdown-panel { position: absolute; top: 100%; left: 0; z-index: 20; display: flex; flex-direction: column; background: #fff; border: 1px solid #ccc; border-radius: 6px; margin-top: 4px; width: 240px; box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
  .dropdown-search { margin: 8px 8px 0; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; }
  .dropdown-options { overflow-y: auto; max-height: 220px; padding: 6px 0; }
  .dropdown-option { display: flex; align-items: center; gap: 6px; padding: 4px 12px; font-size: 13px; cursor: pointer; }
  .dropdown-option:hover { background: #f5f5f5; }
  .dropdown-empty { padding: 6px 12px; font-size: 13px; color: #888; }
  .expand-row td { background: #FAFAF8; padding: 14px 20px; }
  .badge { display: inline-block; background: #eee; border-radius: 20px; padding: 2px 8px; font-size: 12px; color: #555; }
  .chev { cursor: pointer; color: #888; text-align: center; }
  th:first-child, td:first-child { width: 24px; text-align: center; padding-left: 10px; padding-right: 4px; }
  .setup { background: #FFF8E1; border: 1px solid #E8D9A0; border-radius: 8px; padding: 14px 18px; margin-bottom: 20px; font-size: 14px; }
  .setup input { width: 100%; margin: 4px 0 10px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; }
  .offline-banner { background: #FDECEA; border: 1px solid #F3B4AE; color: #7A2E27; padding: 8px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<h2>Builder Matrix</h2>

<div class="setup" id="setupBox" style="display:none;">
  <strong>Connect to Airtable</strong> — enter your credentials once (stored only in this browser tab's memory, not saved anywhere). Once connected, this replaces the preloaded demo data with your live base.
  <label>Personal access token</label>
  <input type="password" id="apiKey" placeholder="patXXXXXXXXXXXXXX">
  <label>Base ID</label>
  <input type="text" id="baseId" placeholder="appXXXXXXXXXXXXXX">
  <label>Builders table name</label>
  <input type="text" id="tableName" value="Builders">
  <button class="primary" id="connectBtn">Connect</button>
</div>

<div id="mainApp" style="display:block;">
  <div class="offline-banner" id="offlineBanner"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search builders...">
    <button id="filtersToggleBtn">Filters ▾</button>
    <button class="primary" id="addBtn">Add builder</button>
    <button id="refreshBtn">Refresh</button>
    <button id="exportBtn">Export to Excel</button>
    <button id="connectToggleBtn">Connect to Airtable</button>
  </div>
  <div class="filters" id="filters" style="display:none;"></div>
  <div class="status" id="status"></div>
  <table id="table">
    <thead><tr><th></th><th>Name</th><th>Company type</th><th>Cities</th><th>Building type</th><th>Contacts</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
document.getElementById('connectToggleBtn').onclick = () => {
  const box = document.getElementById('setupBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
};

document.getElementById('filtersToggleBtn').onclick = () => {
  const box = document.getElementById('filters');
  const btn = document.getElementById('filtersToggleBtn');
  const isHidden = box.style.display === 'none';
  box.style.display = isHidden ? 'flex' : 'none';
  btn.textContent = isHidden ? 'Filters ▴' : 'Filters ▾';
};

  const savedTable = localStorage.getItem('wa_builders_table');
  if (savedKey && savedBase) {

function showOfflineBanner(cachedAt) {
  const banner = document.getElementById('offlineBanner');
  banner.style.display = 'block';
  banner.style.background = '#FDECEA';
  banner.style.borderColor = '#F3B4AE';
  banner.style.color = '#7A2E27';
  banner.textContent = cachedAt
    ? `Showing last synced data from ${new Date(cachedAt).toLocaleString()} — you're offline. Changes can't be saved until you're back online.`
    : `You're offline and no cached data is available yet.`;
}
function hideOfflineBanner() {
  document.getElementById('offlineBanner').style.display = 'none';
}

async function airtableFetch(path, options = {}) {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE)}${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `Bearer ${API_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`Airtable error ${res.status}: ${await res.text()}`);
  return res.json();
}


function toCitiesArray(val) {
  if (Array.isArray(val)) return val;
  if (typeof val === 'string' && val.trim()) return val.split(/[,;]/).map(s => s.trim()).filter(Boolean);
  return [];
}

function builderWebsite(f) {
  if (f.Website) return f.Website;
  const slug = (f.Name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return `https://example.com/${slug}`;
}

async function loadRecords() {
  setStatus('Loading...');
  try {
    let all = [];
    let offset;
    do {
      const data = await airtableFetch(offset ? `?offset=${offset}` : '');
      all = all.concat(data.records);
      offset = data.offset;
    } while (offset);
    records = all;
    localStorage.setItem('wa_builders_cache', JSON.stringify(records));
    localStorage.setItem('wa_builders_cache_time', Date.now().toString());
    hideOfflineBanner();
    render();
    setStatus(`${records.length} builders loaded.`);
  } catch (e) {
    const isRealOffline = !navigator.onLine || e.message.includes('Failed to fetch') || e.message.includes('NetworkError');
    if (isRealOffline) {
      const cached = localStorage.getItem('wa_builders_cache');
      const cachedAt = localStorage.getItem('wa_builders_cache_time');
      if (cached) {
        records = JSON.parse(cached);
        showOfflineBanner(cachedAt ? parseInt(cachedAt) : null);
        render();
        setStatus(`${records.length} builders loaded from offline cache.`);
      } else {
        showOfflineBanner(null);
        setStatus('Could not load data: ' + e.message);
      }
    } else {
      hideOfflineBanner();
      showApiErrorBanner(e.message);
      setStatus('Airtable request failed — see message above.');
    }
  }
}

function showApiErrorBanner(message) {
  const banner = document.getElementById('offlineBanner');
  banner.style.display = 'block';
  banner.style.background = '#FFF3CD';
  banner.style.borderColor = '#E8D9A0';
  banner.style.color = '#6B5900';
  banner.textContent = `Airtable rejected the request — this isn't an offline issue. Check your token permissions, base ID, and table name. (${message})`;
}


function uniqueVals(key) {
  const s = new Set();
  records.forEach(r => {
    const v = r.fields[key];
    if (key === 'City') { toCitiesArray(r.fields.Cities).forEach(c => s.add(c)); }
    else if (key === 'Building type') { toCitiesArray(v).forEach(bt => s.add(bt)); }
    else if (v) s.add(v);
  });
  return Array.from(s).sort();
}

const activeDropdowns = [];

function createCheckboxDropdown({ container, label, options, initialSelected, searchable, onChange, formatLabel }) {
  const selected = new Set(initialSelected || []);
  let isOpen = false;
  let searchQuery = '';
  const displayText = formatLabel || (opt => opt);

  function summary() {
    return selected.size ? `${label} (${selected.size})` : `${label}: all`;
  }

  function renderInner() {
    const optionsHtml = options.length ? options.map(opt => {
      const text = displayText(opt);
      const visible = !searchQuery || text.toLowerCase().includes(searchQuery.toLowerCase());
      return `<label class="dropdown-option" style="display:${visible ? 'flex' : 'none'};">
        <input type="checkbox" value="${esc(opt)}" ${selected.has(opt) ? 'checked' : ''}> ${esc(text)}
      </label>`;
    }).join('') : `<div class="dropdown-empty">No options</div>`;

    container.innerHTML = `
      <button type="button" class="dropdown-toggle">${esc(summary())} ▾</button>
      <div class="dropdown-panel" style="display:${isOpen ? 'flex' : 'none'};">
        ${searchable ? `<input type="text" class="dropdown-search" placeholder="Search...">` : ''}
        <div class="dropdown-options">${optionsHtml}</div>
      </div>`;

    container.querySelector('.dropdown-toggle').onclick = (e) => {
      e.stopPropagation();
      isOpen = !isOpen;
      renderInner();
      const search = container.querySelector('.dropdown-search');
      if (isOpen && search) search.focus();
    };
    container.querySelectorAll('.dropdown-option input').forEach(cb => {
      cb.onclick = (e) => e.stopPropagation();
      cb.onchange = () => {
        cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
        onChange(Array.from(selected));
        renderInner();
        const search = container.querySelector('.dropdown-search');
        if (search) search.focus();
      };
    });
    const search = container.querySelector('.dropdown-search');
    if (search) {
      search.value = searchQuery;
      search.oninput = () => { searchQuery = search.value; renderInner(); };
    }
  }

  container.classList.add('dropdown-box');
  renderInner();
  const instance = {
    container,
    getSelected: () => Array.from(selected),
    clear: () => { selected.clear(); renderInner(); },
    close: () => { if (isOpen) { isOpen = false; renderInner(); } }
  };
  activeDropdowns.push(instance);
  return instance;
}

function forgetDropdown(dd) {
  const idx = activeDropdowns.indexOf(dd);
  if (idx !== -1) activeDropdowns.splice(idx, 1);
}

document.addEventListener('click', (e) => {
  activeDropdowns.forEach(dd => {
    if (dd.container && !dd.container.contains(e.target)) dd.close();
  });
});

function groupByCounty(cities) {
  const groups = {};
  cities.forEach(c => {
    const county = CITY_COUNTY[c] || 'Other';
    (groups[county] = groups[county] || []).push(c);
  });
  return Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0]));
}

  renderFilters();

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const tbody = document.getElementById('tbody');
  const rows = records.filter(r => {
    const f = r.fields;
    if (activeFilters['Company type'].length && !activeFilters['Company type'].includes(f['Company type'])) return false;
    if (activeFilters['Building type'].length && !toCitiesArray(f['Building type']).some(bt => activeFilters['Building type'].includes(bt))) return false;
    if (activeFilters.City.length && !toCitiesArray(f.Cities).some(c => activeFilters.City.includes(c))) return false;
    if (!q) return true;
    const contactBlob = [1,2,3,4].map(n => [f[`Contact ${n} Name`], f[`Contact ${n} Phone`], f[`Contact ${n} Email`], f[`Contact ${n} Role`]].join(' ')).join(' ');
    const hay = [f.Name, f['Company type'], toCitiesArray(f.Cities).join(' '), toCitiesArray(f['Building type']).join(' '), contactBlob].join(' ').toLowerCase();
    return hay.includes(q);
  });
  lastFilteredRows = rows;
  tbody.innerHTML = rows.map(r => {
    const f = r.fields;
    const cities = toCitiesArray(f.Cities);
    const isOpen = expandedIds.has(r.id);
    const preview = cities.length > 4 ? cities.slice(0,3).join(', ') + ` +${cities.length-3} more` : cities.join(', ');
    const contactCount = [1,2,3,4].filter(n => f[`Contact ${n} Name`]).length;
    let expandHtml = '';
    if (isOpen) {
      const cityHtml = groupByCounty(cities).map(([county, list]) =>
        `<div style="margin-bottom:6px;"><strong>${esc(county)} County (${list.length}):</strong> ${esc(list.join(', '))}</div>`).join('');
      const contactRows = [1,2,3,4].map(n => {
        const name = f[`Contact ${n} Name`];
        if (!name) return '';
        return `<tr>
          <td style="padding:3px 8px 3px 0; font-weight:500;">${esc(name)}</td>
          <td style="padding:3px 8px; color:var(--text-secondary,#666);">${esc(f[`Contact ${n} Role`])}</td>
          <td style="padding:3px 8px;">${esc(f[`Contact ${n} Phone`])}</td>
          <td style="padding:3px 0;">${f[`Contact ${n} Email`] ? `<a href="mailto:${esc(f[`Contact ${n} Email`])}" onclick="event.stopPropagation()">${esc(f[`Contact ${n} Email`])}</a>` : ''}</td>
        </tr>`;
      }).join('');
      const contactHtml = contactRows ? `<table style="font-size:13px; border-collapse:collapse;"><tbody>${contactRows}</tbody></table>` : '—';
      const doc = f['Document link'] ? `<div style="margin-top:8px;"><a href="${f['Document link']}" target="_blank">Open document</a></div>` : '';
      expandHtml = `<tr class="expand-row"><td colspan="7">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
          <div><strong>Cities (${cities.length})</strong><div style="margin-top:6px;">${cityHtml || '—'}</div></div>
          <div><strong>Contacts</strong><div style="margin-top:6px;">${contactHtml || '—'}</div>${doc}</div>
        </div>
        <div style="margin-top:10px;"><button data-edit="${r.id}">Edit</button></div>
      </td></tr>`;
    }
    return `<tr style="cursor:pointer;" data-toggle="${r.id}">
      <td class="chev">${isOpen ? '▾' : '▸'}</td>
      <td><a href="${builderWebsite(f)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(f.Name)}</a></td>
      <td>${esc(f['Company type'])}</td>
      <td>${esc(preview)} <span class="badge">${cities.length}</span></td>
      <td>${esc(toCitiesArray(f['Building type']).join(', '))}</td>
      <td><span class="badge">${contactCount} contact${contactCount===1?'':'s'}</span></td>
      <td></td>
    </tr>${expandHtml}`;
  }).join('');
  tbody.querySelectorAll('[data-toggle]').forEach(tr => {
    tr.onclick = (e) => {
      if (e.target.closest('button')) return;
      const id = tr.dataset.toggle;
      expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id);
      renderTable();
    };
  });
  tbody.querySelectorAll('[data-edit]').forEach(b => b.onclick = (e) => { e.stopPropagation(); openForm(b.dataset.edit); });
  tbody.querySelectorAll('[data-del]').forEach(b => b.onclick = (e) => { e.stopPropagation(); deleteRecord(b.dataset.del); });
}

function exportToExcel() {
  const headers = ['Name','Company type','Building type','Cities','Document link',
    'Contact 1 Name','Contact 1 Role','Contact 1 Phone','Contact 1 Email',
    'Contact 2 Name','Contact 2 Role','Contact 2 Phone','Contact 2 Email',
    'Contact 3 Name','Contact 3 Role','Contact 3 Phone','Contact 3 Email',
    'Contact 4 Name','Contact 4 Role','Contact 4 Phone','Contact 4 Email'];
  const csvRows = [headers.join(',')];
  lastFilteredRows.forEach(r => {
    const f = r.fields;
    const row = headers.map(h => {
      let v = (h === 'Cities' || h === 'Building type') ? toCitiesArray(f[h]).join('; ') : (f[h] || '');
      v = String(v).replace(/"/g, '""');
      return `"${v}"`;
    });
    csvRows.push(row.join(','));
  });
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wa-builders-export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

      <div class="field"><label>Cities</label><div id="fCitiesDD"></div></div>
      <div class="field"><label>Building type</label><div id="fBuildingTypeDD"></div></div>
      <div class="field"><label>Document link</label><input id="fDoc" value="${esc(f['Document link'])}"></div>
      <div id="contactsContainer">${activeContacts.map(contactBlockHtml).join('')}</div>
      <button type="button" id="addContactBtn" style="margin-top:8px;">+ Add contact</button>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:16px;">
        <button id="cancelForm">Cancel</button>
        <button class="primary" id="saveForm">Save</button>
      </div>
      ${id ? `<div style="text-align:center; margin-top:14px;"><button id="deleteForm" style="border:none; background:none; color:#B3261E; font-size:13px; cursor:pointer; padding:4px;">Delete this builder</button></div>` : ''}
    </div>`;
  document.body.appendChild(overlay);

  const fCitiesDropdown = createCheckboxDropdown({
    container: overlay.querySelector('#fCitiesDD'),
    label: 'Cities',
    options: allCities,
    initialSelected: Array.from(selectedCities),
    searchable: true,
    formatLabel: (c) => `${c} (${CITY_COUNTY[c]})`,
    onChange: () => {}
  });
  const fBuildingTypeDropdown = createCheckboxDropdown({
    container: overlay.querySelector('#fBuildingTypeDD'),
    label: 'Building type',
    options: allBuildingTypes,
    initialSelected: Array.from(selectedBuildingTypes),
    searchable: false,
    onChange: () => {}
  });
  function forgetFormDropdowns() {
    [fCitiesDropdown, fBuildingTypeDropdown].forEach(forgetDropdown);
  }

  function refreshAddButtonVisibility() {
    const count = overlay.querySelectorAll('.contact-block').length;
    overlay.querySelector('#addContactBtn').style.display = count >= 4 ? 'none' : 'inline-block';
  }
  refreshAddButtonVisibility();

  overlay.querySelector('#addContactBtn').onclick = () => {
    const used = Array.from(overlay.querySelectorAll('.contact-block')).map(el => parseInt(el.dataset.slot));
    const nextSlot = [1,2,3,4].find(n => !used.includes(n));
    if (!nextSlot) return;
    overlay.querySelector('#contactsContainer').insertAdjacentHTML('beforeend', contactBlockHtml(nextSlot));
    refreshAddButtonVisibility();
  };

  overlay.querySelector('#closeForm').onclick = () => { forgetFormDropdowns(); overlay.remove(); };
  overlay.querySelector('#cancelForm').onclick = () => { forgetFormDropdowns(); overlay.remove(); };
  if (id) {
    overlay.querySelector('#deleteForm').onclick = async () => {
      await deleteRecord(id);
      forgetFormDropdowns();
      overlay.remove();
    };
  }

  overlay.querySelector('#saveForm').onclick = async () => {
    const fields = {
      Name: overlay.querySelector('#fName').value.trim(),
      'Company type': overlay.querySelector('#fCompanyType').value.trim(),
      'Building type': fBuildingTypeDropdown.getSelected(),
      'Document link': overlay.querySelector('#fDoc').value.trim()
    };
    [1,2,3,4].forEach(n => {
      const block = overlay.querySelector(`.contact-block[data-slot="${n}"]`);
      fields[`Contact ${n} Name`] = block ? block.querySelector(`#c${n}Name`).value.trim() : '';
      fields[`Contact ${n} Role`] = block ? block.querySelector(`#c${n}Role`).value.trim() : '';
      fields[`Contact ${n} Phone`] = block ? block.querySelector(`#c${n}Phone`).value.trim() : '';
      fields[`Contact ${n} Email`] = block ? block.querySelector(`#c${n}Email`).value.trim() : '';
    });
    fields.Cities = fCitiesDropdown.getSelected();
    if (!navigator.onLine) {
      alert("You're offline — changes can't be saved right now. Try again once you're back online.");
      return;
    }
    try {
      if (id) {
        await airtableFetch(`/${id}`, { method: 'PATCH', body: JSON.stringify({ fields, typecast: true }) });
      } else {
        await airtableFetch('', { method: 'POST', body: JSON.stringify({ fields, typecast: true }) });
      }
      forgetFormDropdowns();
      overlay.remove();
      await loadRecords();
    } catch (e) {
      alert('Save failed: ' + e.message);
    }
  };
}

async function deleteRecord(id) {
  if (!confirm('Delete this builder?')) return;
  if (!navigator.onLine) {
    alert("You're offline — changes can't be saved right now. Try again once you're back online.");
    return;
  }
  try {
    await airtableFetch(`/${id}`, { method: 'DELETE' });
    await loadRecords();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

window.addEventListener('online', () => { hideOfflineBanner(); loadRecords(); });
window.addEventListener('offline', () => showOfflineBanner(localStorage.getItem('wa_builders_cache_time')));
</script>
</body>
</html>
